name: insight_ed_mobile
description: Modern InsightEd Mobile Application.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Audio / Voice / TTS libraries
  flutter_tts: ^4.2.5
  record: ^6.2.0
  audioplayers: ^6.6.0
  speech_to_text: ^7.3.0
  
  # UI & Animations
  flutter_animate: ^4.2.0
  glassmorphism: ^3.0.0
  lucide_icons: ^0.257.0
  provider: ^6.1.1
  go_router: ^17.2.3
  alan_voice: ^4.9.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
